services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sqlraine16
      POSTGRES_DB: student_enrollment_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "5001:8080"
    environment:
      DAY6_PG_CONN: "Host=db;Port=5432;Database=student_enrollment_db;Username=postgres;Password=sqlraine16"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
